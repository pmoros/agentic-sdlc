name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history, not just the last commit
      - uses: jdx/mise-action@v2 # installs the exact tool versions pinned in .mise.toml
      - run: scripts/security-check.sh

  script-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: python3 -m unittest discover -s scripts/tests -p 'test_*.py' -v
